<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Page introuvable - A Beyrouth</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  img.logo {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    margin-bottom: 24px;
    object-fit: cover;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 10px;
  }
  p {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  a.btn {
    display: inline-block;
    background: #1B8C3E;
    color: #fff;
    text-decoration: none;
    padding: 13px 28px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
  }
</style>
</head>
<body>
  <img class="logo" src="/img/logo-olives.svg" alt="A Beyrouth" onerror="this.style.display='none'">
  <h1>Page introuvable</h1>
  <p>Cette page n'existe pas ou a été déplacée.<br>Retourne au menu pour passer commande.</p>
  <a class="btn" href="/">Voir le menu</a>
</body>
</html>
