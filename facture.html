<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facture - A Beyrouth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .loader-container {
      text-align: center;
      padding: 40px 20px;
    }
    .logo {
      width: 200px;
      height: auto;
      margin-bottom: 30px;
      filter: brightness(0) invert(1);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: 700;
    }
    p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 2px solid #ef4444;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .error h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }
    .retry-btn {
      background: #fff;
      color: #667eea;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      transition: transform 0.2s;
    }
    .retry-btn:hover {
      transform: scale(1.05);
    }
    #invoice-frame {
      display: none;
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div class="loader-container" id="loader">
    <img src="img/logo-email-final.png" alt="A Beyrouth" class="logo">
    <h1>Chargement de votre facture</h1>
    <p>Veuillez patienter...</p>
    <div class="spinner"></div>
    <div id="error" class="error" style="display: none;">
      <h2>⚠️ Erreur</h2>
      <p id="error-message">Une erreur est survenue.</p>
      <button class="retry-btn" onclick="location.reload()">Réessayer</button>
    </div>
  </div>

  <iframe id="invoice-frame"></iframe>

  <script>
    // Récupérer le numéro de commande depuis l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const numero = urlParams.get('numero');

    if (!numero) {
      document.getElementById('error-message').textContent = 'Numéro de commande manquant.';
      document.getElementById('error').style.display = 'block';
      document.querySelector('.spinner').style.display = 'none';
    } else {
      // Charger directement le HTML de la facture dans l'iframe
      const iframe = document.getElementById('invoice-frame');
      const url = `https://xbuftfwcyontgqbbrrjt.supabase.co/functions/v1/generate-invoice-pdf?numero=${encodeURIComponent(numero)}`;

      iframe.onload = function() {
        // Masquer le loader et afficher l'iframe
        document.getElementById('loader').style.display = 'none';
        iframe.style.display = 'block';

        // Déclencher automatiquement l'impression après 500ms
        setTimeout(() => {
          window.print();
        }, 500);
      };

      iframe.onerror = function() {
        document.getElementById('error-message').textContent = 'Impossible de charger la facture.';
        document.getElementById('error').style.display = 'block';
        document.querySelector('.spinner').style.display = 'none';
      };

      iframe.src = url;
    }

    // Gérer l'impression
    window.onafterprint = function() {
      // Optionnel : fermer la page après impression
      // window.close();
    };
  </script>
</body>
</html>
