<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facture - A Beyrouth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #000 0%, #2d2d2d 100%);
      padding: 30px;
      text-align: center;
      color: white;
      border-bottom: 3px solid #D4A853;
    }
    .header img {
      width: 180px;
      height: auto;
      margin-bottom: 15px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0;
    }
    .download-section {
      padding: 24px 30px;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .download-btn {
      background: #000;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .download-btn:hover {
      opacity: 0.8;
    }
    .download-btn:active {
      opacity: 0.7;
    }
    #invoice-content {
      padding: 40px;
      display: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      background: #fee;
      border: 2px solid #ef4444;
      border-radius: 8px;
      padding: 20px;
      margin: 20px;
      color: #991b1b;
      text-align: center;
    }
    @media (max-width: 768px) {
      body {
        padding: 0;
      }
      .container {
        border-radius: 0;
      }
      .header {
        padding: 20px;
      }
      .header img {
        width: 140px;
      }
      .header h1 {
        font-size: 20px;
      }
      .download-section {
        padding: 20px;
      }
      .download-btn {
        width: 100%;
        justify-content: center;
      }
      #invoice-content {
        padding: 20px !important;
      }
    }
    @media print {
      body {
        background: white;
        padding: 0;
      }
      .container {
        box-shadow: none;
        border-radius: 0;
      }
      .header, .download-section {
        display: none;
      }
      #invoice-content {
        display: block !important;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="header">
      <img src="/img/logo-email-final.png" alt="A Beyrouth">
      <h1>Votre ticket</h1>
    </div>

    <div class="download-section" id="download-section">
      <button class="download-btn" onclick="window.print()">
        <span style="font-size: 20px;">📄</span>
        Télécharger / Imprimer en PDF
      </button>
      <p style="margin-top: 15px; color: #666; font-size: 14px;">
        Utilisez "Enregistrer en PDF" dans la boîte de dialogue d'impression
      </p>
    </div>

    <div class="spinner" id="spinner" style="border-color:rgba(0,0,0,0.1);border-top-color:#000;"></div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="invoice-content"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('error').textContent = '⚠️ Lien invalide ou expiré';
      document.getElementById('error').style.display = 'block';
      document.getElementById('spinner').style.display = 'none';
    } else {
      // Charger la facture via token sécurisé
      fetch(`https://xbuftfwcyontgqbbrrjt.supabase.co/functions/v1/generate-invoice-pdf?token=${encodeURIComponent(token)}`)
        .then(response => {
          if (!response.ok) throw new Error(`Erreur ${response.status}`);
          return response.text();
        })
        .then(html => {
          // Extraire le contenu body ET les styles du head
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');

          // Injecter les styles de l'Edge Function dans le head
          doc.querySelectorAll('head style').forEach(style => {
            document.head.appendChild(document.adoptNode(style));
          });

          // Injecter le contenu via adoptNode (préserve le DOM parsé sans re-exécuter les scripts)
          const target = document.getElementById('invoice-content');
          target.innerHTML = '';
          Array.from(doc.body.childNodes).forEach(node => {
            target.appendChild(document.adoptNode(node));
          });
          document.getElementById('invoice-content').style.display = 'block';
          document.getElementById('spinner').style.display = 'none';
        })
        .catch(error => {
          document.getElementById('error').textContent = `⚠️ Erreur : ${error.message}`;
          document.getElementById('error').style.display = 'block';
          document.getElementById('spinner').style.display = 'none';
        });
    }
  </script>
</body>
</html>
