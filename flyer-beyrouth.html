<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 148mm;
    height: 210mm;
    background: #F7F7F5;
    display: flex;
    flex-direction: column;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #1A1A1A;
    position: relative;
}

/* HEADER MINIMAL */
.header {
    background: #1A1A1A;
    padding: 35px 30px 30px;
    text-align: center;
}

.emoji-logo {
    font-size: 65px;
    margin-bottom: 12px;
}

.brand {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 42px;
    font-weight: 400;
    color: white;
    letter-spacing: 0.5px;
}

.brand-express {
    font-weight: 700;
    font-style: italic;
    transform: skewX(-8deg);
    display: inline-block;
    color: #D4AF37;
    letter-spacing: 1.5px;
    margin-left: 8px;
}

/* MAIN CONTENT - CENTRÉ */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 35px;
    text-align: center;
}

.click-collect {
    font-size: 52px;
    font-weight: 900;
    color: #1B8C3E;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 20px;
    line-height: 1.1;
}

.tagline {
    font-size: 22px;
    font-weight: 600;
    color: #6B6B6B;
    margin-bottom: 45px;
    line-height: 1.4;
}

/* QR CODE */
.qr-container {
    background: white;
    padding: 22px;
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    border: 3px solid #1B8C3E;
    margin-bottom: 30px;
}

.qr-code {
    width: 200px;
    height: 200px;
    display: block;
}

/* URL */
.url {
    font-size: 48px;
    font-weight: 900;
    color: #1A1A1A;
    letter-spacing: -1px;
    margin-bottom: 15px;
}

.url-sub {
    font-size: 16px;
    font-weight: 600;
    color: #1B8C3E;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* FOOTER SIMPLE */
.footer {
    background: #1A1A1A;
    color: white;
    padding: 25px 30px;
    text-align: center;
}

.footer-address {
    font-size: 15px;
    font-weight: 600;
    opacity: 0.9;
    line-height: 1.6;
}

.footer-metro {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 6px;
}
</style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="emoji-logo">🧆</div>
        <div class="brand">
            À Beyrouth
            <span class="brand-express">Express</span>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="click-collect">Click &<br>Collect</div>
        <div class="tagline">Commandez en ligne<br>Récupérez en 15 min</div>

        <div class="qr-container">
            <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://beyrouth.express" alt="QR Code">
        </div>

        <div class="url">beyrouth.express</div>
        <div class="url-sub">Scannez ou tapez l'adresse</div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer-address">
            📍 4 Esplanade du Général de Gaulle<br>
            92400 Courbevoie · La Défense
        </div>
        <div class="footer-metro">Sortie 4 du métro</div>
    </div>
</body>
</html>
