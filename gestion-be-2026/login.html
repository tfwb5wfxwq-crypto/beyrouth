<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }
    p {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    .error {
      color: #e74c3c;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🔒 Admin Beyrouth</h1>
    <p>Entrez le code admin pour accéder</p>

    <input
      type="text"
      id="codeInput"
      placeholder="Code admin"
      autofocus
      maxlength="10"
    >

    <button onclick="login()">Se connecter</button>

    <div class="error" id="error">❌ Code incorrect</div>
  </div>

  <script>
    // 🔒 SÉCURITÉ : Authentification via Edge Function (code stocké côté serveur)
    const SUPABASE_URL = 'https://xbuftfwcyontgqbbrrjt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhidWZ0ZndjeW9udGdxYmJycmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2Njg1NzksImV4cCI6MjA4NjI0NDU3OX0.ROkSccADlpLsWMgqyiX_xNaFdJNR8P4R-LJCnZV2Gzg';

    // Enter key to submit
    document.getElementById('codeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const code = document.getElementById('codeInput').value.trim();
      if (!code) return;

      // Désactiver le bouton pendant la vérification
      const button = document.querySelector('button');
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = 'Vérification...';

      try {
        // 🔒 Appeler l'Edge Function pour valider le code côté serveur
        const response = await fetch(`${SUPABASE_URL}/functions/v1/admin-auth`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ code })
        });

        const data = await response.json();

        if (data.success && data.token) {
          // Sauvegarder le token (PAS le code)
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminTokenExpiry', Date.now() + data.expiresIn * 1000);

          // Rediriger vers l'admin
          window.location.href = './index.html';
        } else {
          // Afficher erreur
          document.getElementById('error').style.display = 'block';
          document.getElementById('codeInput').value = '';
          document.getElementById('codeInput').focus();

          // Cacher l'erreur après 3s
          setTimeout(() => {
            document.getElementById('error').style.display = 'none';
          }, 3000);
        }
      } catch (error) {
        console.error('Erreur auth:', error);
        document.getElementById('error').textContent = '❌ Erreur de connexion';
        document.getElementById('error').style.display = 'block';
        setTimeout(() => {
          document.getElementById('error').style.display = 'none';
          document.getElementById('error').textContent = '❌ Code incorrect';
        }, 3000);
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    }
  </script>
</body>
</html>
