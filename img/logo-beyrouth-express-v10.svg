<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 40" fill="none">
  <defs>
    <!-- Or subtil et élégant -->
    <linearGradient id="softGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A961"/>
      <stop offset="100%" style="stop-color:#B8956A"/>
    </linearGradient>

    <!-- Ombre douce -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- BEYROUTH - or doux (réduit) -->
  <text
    x="5"
    y="25"
    font-family="'DM Serif Display', Georgia, serif"
    font-size="21"
    font-weight="600"
    letter-spacing="2.2"
    fill="url(#softGold)"
    filter="url(#shadow)">
    BEYROUTH
  </text>

  <!-- EXPRESS - blanc crème (réduit) -->
  <text
    x="150"
    y="25"
    font-family="-apple-system, sans-serif"
    font-size="21"
    font-weight="700"
    font-style="italic"
    letter-spacing="1.2"
    fill="#F5F5F0"
    filter="url(#shadow)">
    EXPRESS
  </text>
</svg>
