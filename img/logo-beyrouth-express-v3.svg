<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 65" fill="none">
  <defs>
    <!-- Dégradé OR riche -->
    <linearGradient id="richGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A961"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#E5C078"/>
    </linearGradient>

    <!-- Dégradé cuivre pour EXPRESS -->
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B87333"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>

    <!-- Ombre douce -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Lueur dorée subtile -->
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#D4AF37" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cèdre du Liban stylisé (symbole authentique) -->
  <g transform="translate(8, 18)" filter="url(#goldGlow)">
    <!-- Tronc -->
    <rect x="11" y="20" width="3" height="8" fill="url(#richGold)" opacity="0.9"/>

    <!-- Branches (3 niveaux) -->
    <path d="M 12.5 20 L 8 16 L 17 16 Z" fill="url(#richGold)" opacity="0.95"/>
    <path d="M 12.5 16 L 6 12 L 19 12 Z" fill="url(#richGold)"/>
    <path d="M 12.5 12 L 4 8 L 21 8 Z" fill="url(#richGold)" opacity="0.9"/>
  </g>

  <!-- BEYROUTH (or, élégant, restaurant) -->
  <text
    x="40"
    y="32"
    font-family="'Playfair Display', 'Crimson Text', Georgia, serif"
    font-size="30"
    font-weight="600"
    letter-spacing="3"
    fill="url(#richGold)"
    filter="url(#softShadow)">
    BEYROUTH
  </text>

  <!-- Petit séparateur doré (graines de sésame stylisées) -->
  <circle cx="45" cy="42" r="1.5" fill="#D4AF37" opacity="0.6"/>
  <circle cx="52" cy="42" r="1.5" fill="#C9A961" opacity="0.5"/>
  <circle cx="59" cy="42" r="1.5" fill="#E5C078" opacity="0.4"/>

  <!-- EXPRESS (cuivre, moderne mais premium) -->
  <text
    x="68"
    y="52"
    font-family="'Montserrat', -apple-system, sans-serif"
    font-size="18"
    font-weight="700"
    font-style="italic"
    letter-spacing="2.5"
    fill="url(#copper)"
    filter="url(#softShadow)">
    EXPRESS
  </text>

  <!-- Petit accent (feuille de laurier stylisée - gastronomie) -->
  <path
    d="M 158 48 Q 162 46, 164 50 Q 162 52, 158 50 Z"
    fill="#B87333"
    opacity="0.5"
    filter="url(#softShadow)"/>
</svg>
