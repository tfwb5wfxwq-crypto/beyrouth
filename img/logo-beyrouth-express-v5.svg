<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <!-- Dégradé or élégant -->
    <linearGradient id="elegantGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A961"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#C9A961"/>
    </linearGradient>

    <!-- Ombre douce -->
    <filter id="soft">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- BEYROUTH - ligne 1 -->
  <text
    x="100"
    y="26"
    font-family="'Cormorant Garamond', 'Crimson Text', Georgia, serif"
    font-size="24"
    font-weight="500"
    letter-spacing="3.5"
    fill="url(#elegantGold)"
    filter="url(#soft)"
    text-anchor="middle">
    BEYROUTH
  </text>

  <!-- EXPRESS - ligne 2 (italique = vitesse) -->
  <text
    x="100"
    y="48"
    font-family="'Montserrat', -apple-system, sans-serif"
    font-size="16"
    font-weight="600"
    font-style="italic"
    letter-spacing="2.8"
    fill="#F5F5F5"
    filter="url(#soft)"
    text-anchor="middle">
    EXPRESS
  </text>
</svg>
