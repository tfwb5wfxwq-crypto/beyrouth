<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <defs>
    <!-- Dégradé or premium pour BEYROUTH -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4D03F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>

    <!-- Dégradé pour EXPRESS (plus sombre) -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A3A3A;stop-opacity:1" />
    </linearGradient>

    <!-- Ombre portée -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- BEYROUTH (élégant, serif) -->
  <text
    x="5"
    y="28"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="700"
    letter-spacing="1.5"
    fill="url(#goldGradient)"
    filter="url(#shadow)">
    BEYROUTH
  </text>

  <!-- Petit symbole falafel stylisé -->
  <circle cx="178" cy="22" r="2.5" fill="url(#goldGradient)" opacity="0.6"/>

  <!-- Lignes de vitesse (avant EXPRESS) -->
  <line x1="5" y1="45" x2="35" y2="45" stroke="url(#darkGradient)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="15" y1="50" x2="40" y2="50" stroke="url(#darkGradient)" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- EXPRESS (italique, dynamique) -->
  <text
    x="48"
    y="53"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
    font-size="18"
    font-weight="600"
    font-style="italic"
    letter-spacing="1.2"
    fill="url(#darkGradient)">
    EXPRESS
  </text>

  <!-- Lignes de vitesse (après EXPRESS) -->
  <line x1="135" y1="45" x2="160" y2="45" stroke="url(#darkGradient)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="140" y1="50" x2="158" y2="50" stroke="url(#darkGradient)" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="145" y1="55" x2="155" y2="55" stroke="url(#darkGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
</svg>
