<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 55" fill="none">
  <defs>
    <!-- Dégradé OR pour BEYROUTH -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>

    <!-- Ombre forte -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- BEYROUTH - OR -->
  <text
    x="5"
    y="30"
    font-family="Georgia, serif"
    font-size="26"
    font-weight="700"
    letter-spacing="2.5"
    fill="url(#goldMain)"
    filter="url(#shadow)">
    BEYROUTH
  </text>

  <!-- Lignes de vitesse -->
  <line x1="10" y1="40" x2="35" y2="40" stroke="#FF8C00" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="15" y1="45" x2="38" y2="45" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- EXPRESS - BLANC PUR (pas de dégradé) -->
  <text
    x="45"
    y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="900"
    font-style="italic"
    letter-spacing="2"
    fill="#FFFFFF"
    filter="url(#shadow)">
    EXPRESS
  </text>

  <!-- Lignes de vitesse après EXPRESS -->
  <line x1="145" y1="40" x2="165" y2="40" stroke="#FF8C00" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="150" y1="45" x2="168" y2="45" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="153" y1="49" x2="170" y2="49" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
