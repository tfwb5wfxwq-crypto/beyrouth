<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" fill="none">
  <defs>
    <!-- Dégradé OR vif et éclatant -->
    <linearGradient id="goldBright" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC700"/>
      <stop offset="100%" style="stop-color:#FFB700"/>
    </linearGradient>

    <!-- Ombre portée forte -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- BEYROUTH - OR ÉCLATANT -->
  <text
    x="5"
    y="32"
    font-family="Georgia, serif"
    font-size="28"
    font-weight="700"
    letter-spacing="2.5"
    fill="url(#goldBright)"
    filter="url(#shadow)"
    style="text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);">
    BEYROUTH
  </text>

  <!-- Lignes de vitesse oranges VIVES -->
  <line x1="8" y1="41" x2="28" y2="41" stroke="#FF8C00" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="12" y1="45" x2="32" y2="45" stroke="#FFA500" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- EXPRESS - BLANC PUR avec italique rapide -->
  <text
    x="40"
    y="48"
    font-family="-apple-system, sans-serif"
    font-size="18"
    font-weight="800"
    font-style="italic"
    letter-spacing="1.8"
    fill="#FFFFFF"
    filter="url(#shadow)"
    style="text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);">
    EXPRESS
  </text>

  <!-- Lignes de vitesse après EXPRESS -->
  <line x1="125" y1="41" x2="145" y2="41" stroke="#FF8C00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="130" y1="45" x2="148" y2="45" stroke="#FFA500" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="133" y1="48" x2="150" y2="48" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
